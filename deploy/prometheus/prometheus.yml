global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - node-exporter:9100
          # - 192.168.65.105:9100  # 其他服务器
        labels:
          group: 'production'

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']