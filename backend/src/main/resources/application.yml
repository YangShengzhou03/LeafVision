server:
  port: 8081

spring:
  application:
    name: leaf-vision-backend
  
  datasource:
    url: jdbc:h2:file:./data/leafvision;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.leafvision.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.leafvision: DEBUG
    org.springframework.web: INFO

leafvision:
  sync:
    enabled: true
    interval: 60000
  prometheus:
    timeout: 10000
  alertmanager:
    timeout: 10000
